<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - Image Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&family=Poppins:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #667eea;
            --secondary: #764ba2;
            --accent: #667eea;
            --accent-dark: #5568d3;
            --bg-light: #f8f9ff;
            --bg-dark: #1a1a2e;
            --text-dark: #16213e;
            --border-color: #e0e0ff;
            --radius: 12px;
            --transition: all 0.3s ease;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg-light);
            color: var(--text-dark);
        }

        .dashboard-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 2px solid var(--border-color);
        }

        .dashboard-header h1 {
            font-size: 32px;
            background: var(--primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .back-to-home {
            background: var(--primary);
            color: white;
            padding: 10px 25px;
            border-radius: var(--radius);
            text-decoration: none;
            transition: var(--transition);
            font-weight: 600;
        }

        .back-to-home:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: white;
            padding: 30px;
            border-radius: var(--radius);
            border: 2px solid var(--border-color);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
            transition: var(--transition);
        }

        .stat-card:hover {
            border-color: var(--accent);
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.15);
        }

        .stat-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1), rgba(118, 75, 162, 0.05));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
            color: var(--primary);
        }

        .stat-card h3 {
            font-size: 14px;
            color: #666;
            margin-bottom: 10px;
            font-weight: 500;
        }

        .stat-number {
            font-size: 36px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 10px;
        }

        .stat-change {
            font-size: 12px;
            color: #668;
        }

        .stat-change.positive {
            color: #10b981;
        }

        .stat-change.negative {
            color: #ef4444;
        }

        .charts-section {
            background: white;
            padding: 30px;
            border-radius: var(--radius);
            border: 2px solid var(--border-color);
            margin-bottom: 40px;
        }

        .charts-section h2 {
            font-size: 24px;
            margin-bottom: 30px;
            color: var(--text-dark);
        }

        .chart-container {
            margin-bottom: 30px;
        }

        .chart-bar {
            background: var(--bg-light);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chart-label {
            font-size: 14px;
            font-weight: 500;
        }

        .chart-progress {
            flex: 1;
            height: 8px;
            background: var(--border-color);
            border-radius: 4px;
            margin: 0 15px;
            overflow: hidden;
        }

        .chart-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            border-radius: 4px;
            transition: width 0.3s ease;
        }

        .chart-value {
            font-size: 14px;
            font-weight: 600;
            color: var(--primary);
            min-width: 50px;
            text-align: right;
        }

        .reset-btn {
            background: #ef4444;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: var(--radius);
            cursor: pointer;
            font-weight: 600;
            transition: var(--transition);
            margin-top: 20px;
        }

        .reset-btn:hover {
            background: #dc2626;
            transform: scale(1.05);
        }

        .footer {
            text-align: center;
            padding: 20px;
            color: #666;
            font-size: 14px;
        }

        @media (max-width: 768px) {
            .dashboard-header {
                flex-direction: column;
                gap: 15px;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<div class="dashboard-container">
    <!-- Header -->
    <div class="dashboard-header">
        <h1>📊 لوحة التحكم</h1>
        <a href="index.html" class="back-to-home">← العودة للموقع</a>
    </div>

    <!-- Stats Cards -->
    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-icon">
                <i data-lucide="users" style="width: 24px; height: 24px;"></i>
            </div>
            <h3>الزوار اليوم</h3>
            <div class="stat-number" id="visitorsToday">0</div>
            <div class="stat-change positive" id="visitorsChange">↑ اليوم</div>
        </div>

        <div class="stat-card">
            <div class="stat-icon">
                <i data-lucide="image" style="width: 24px; height: 24px;"></i>
            </div>
            <h3>الصور المحولة</h3>
            <div class="stat-number" id="imagesConverted">0</div>
            <div class="stat-change" id="conversionChange">تحويلات اليوم</div>
        </div>

        <div class="stat-card">
            <div class="stat-icon">
                <i data-lucide="activity" style="width: 24px; height: 24px;"></i>
            </div>
            <h3>النشاط</h3>
            <div class="stat-number" id="activeUsers">0</div>
            <div class="stat-change" id="activityStatus">نشطاء الآن</div>
        </div>

        <div class="stat-card">
            <div class="stat-icon">
                <i data-lucide="zap" style="width: 24px; height: 24px;"></i>
            </div>
            <h3>سرعة المعالجة</h3>
            <div class="stat-number" id="avgSpeed">95%</div>
            <div class="stat-change positive">أداء ممتاز</div>
        </div>
    </div>

    <!-- Charts Section -->
    <div class="charts-section">
        <h2>البيانات التفصيلية</h2>

        <div class="chart-container">
            <h3 style="margin-bottom: 15px; font-size: 16px;">التحويلات حسب النوع</h3>
            <div class="chart-bar">
                <span class="chart-label">JPG → PNG</span>
                <div class="chart-progress">
                    <div class="chart-progress-fill" id="chart1" style="width: 45%;"></div>
                </div>
                <span class="chart-value" id="count1">0</span>
            </div>
            <div class="chart-bar">
                <span class="chart-label">PNG → JPG</span>
                <div class="chart-progress">
                    <div class="chart-progress-fill" id="chart2" style="width: 30%;"></div>
                </div>
                <span class="chart-value" id="count2">0</span>
            </div>
            <div class="chart-bar">
                <span class="chart-label">WebP ↔ PNG</span>
                <div class="chart-progress">
                    <div class="chart-progress-fill" id="chart3" style="width: 15%;"></div>
                </div>
                <span class="chart-value" id="count3">0</span>
            </div>
            <div class="chart-bar">
                <span class="chart-label">GIF → PNG</span>
                <div class="chart-progress">
                    <div class="chart-progress-fill" id="chart4" style="width: 10%;"></div>
                </div>
                <span class="chart-value" id="count4">0</span>
            </div>
        </div>

        <button class="reset-btn" onclick="resetStats()">مسح الإحصائيات</button>
    </div>

    <!-- Footer -->
    <div class="footer">
        <p>© 2025 Image Pro - لوحة التحكم | آخر تحديث: <span id="lastUpdate">الآن</span></p>
    </div>
</div>

<script src="dashboard.js"></script>
</body>
</html>
