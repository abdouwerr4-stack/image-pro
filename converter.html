<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محول الصور - Image Pro</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 200'><defs><linearGradient id='g' x1='0%' y1='0%' x2='100%' y2='100%'><stop offset='0%' style='stop-color:%23667eea;stop-opacity:1'/><stop offset='100%' style='stop-color:%23764ba2;stop-opacity:1'/></linearGradient></defs><circle cx='100' cy='100' r='95' fill='url(%23g)'/><g transform='translate(100, 100)'><path d='M -30 -20 L 20 30' stroke='white' stroke-width='16' fill='none' stroke-linecap='round'/><path d='M 20 30 L -35 40' stroke='white' stroke-width='16' fill='none' stroke-linecap='round'/></g></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="converter-page">

<!-- Header -->
<header class="converter-header">
    <a href="index.html" class="back-btn">← العودة</a>
    <div style="display: flex; align-items: center; gap: 10px;">
        <img src="logo.svg" alt="Image Pro Logo" style="width: 40px; height: 40px;">
        <h1>محول الصور الاحترافي</h1>
    </div>
</header>



<!-- Main Converter Section -->
<main class="converter-main">
    <div class="converter-container premium-converter-panel">
        
        <!-- Mode Switch -->
        <div class="mode-switch" style="display: flex; justify-content: center; gap: 12px; margin-bottom: 20px;">
            <button id="convertModeBtn" class="mode-btn active" onclick="setMode('converter')">🔁 محول الصور</button>
            <button id="removeBgModeBtn" class="mode-btn" onclick="setMode('remove-bg')">✨ إزالة الخلفية</button>
        </div>

        <!-- Conversion Type Selection -->
        <div class="conversion-types">
            <h2>اختر نوع التحويل</h2>
            <div class="types-grid">
                <button class="type-btn active" data-type="jpg-png" onclick="selectType('jpg-png', this)">
                    <i data-lucide="image" class="icon"></i>
                    <span>JPG → PNG</span>
                </button>
                <button class="type-btn" data-type="png-jpg" onclick="selectType('png-jpg', this)">
                    <i data-lucide="refresh-cw" class="icon"></i>
                    <span>PNG → JPG</span>
                </button>
                <button class="type-btn" data-type="webp-png" onclick="selectType('webp-png', this)">
                    <i data-lucide="globe" class="icon"></i>
                    <span>WebP ↔ PNG</span>
                </button>
                <button class="type-btn" data-type="gif-png" onclick="selectType('gif-png', this)">
                    <i data-lucide="film" class="icon"></i>
                    <span>GIF → PNG</span>
                </button>
                <button class="type-btn" data-type="raw-png" onclick="selectType('raw-png', this)">
                    <i data-lucide="camera" class="icon"></i>
                    <span>RAW → PNG</span>
                </button>
            </div>
        </div>

        <!-- Upload Area -->
        <div class="upload-area premium-dropzone" id="uploadArea" ondrop="handleDrop(event)" ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)">
            <div class="upload-content">
                <i data-lucide="folder" class="upload-icon"></i>
                <h3>اسحب الصورة هنا</h3>
                <p>أو</p>
                <label for="fileInput" class="file-label">اختر ملف</label>
                <input type="file" id="fileInput" hidden accept="image/*" onchange="handleFileSelect(event)">
            </div>
        </div>

        <!-- Preview Section -->
        <div class="preview-section premium-preview" id="previewSection" style="display: none;">
            <div class="preview-grid">
                <div class="preview-item">
                    <h4>الصورة الأصلية</h4>
                    <img id="originalImage" src="" alt="Original">
                    <p id="originalInfo"></p>
                </div>
                <div class="arrow-divider">→</div>
                <div class="preview-item">
                    <h4>الصورة المحولة</h4>
                    <img id="convertedImage" src="" alt="Converted" style="display: none;">
                    <p id="convertedInfo" style="display: none;"></p>
                    <div id="convertingLoader" style="display: none; text-align: center; padding: 40px;">
                        <div class="spinner"></div>
                        <p>جاري التحويل...</p>
                    </div>
                </div>
            </div>

            <!-- Download Button -->
            <div class="action-buttons">
                <button class="download-btn" id="downloadBtn" onclick="downloadImage()" style="display: none;">
                    ⬇️ تحميل الصورة المحولة
                </button>
                <button class="retry-btn" onclick="resetConverter()">
                    🔄 اختيار صورة أخرى
                </button>
            </div>

            <!-- GIF Options (if applicable) -->
            <div id="gifOptions" style="display: none;" class="gif-options">
                <label>
                    <input type="radio" name="gifMode" value="first" checked> الإطار الأول فقط
                </label>
                <label>
                    <input type="radio" name="gifMode" value="all"> تحويل كل الإطارات
                </label>
            </div>

            <!-- Remove BG Options -->
            <div id="removeBgOptions" style="display: none;" class="remove-bg-options premium-options-box">
                <div class="option-group">
                    <label>طريقة تحديد الخلفية:</label>
                    <div class="radio-group">
                        <label><input type="radio" name="bgDetectionMode" value="auto" checked onchange="toggleColorPicker(false)"> تلقائي (زوايا الصورة)</label>
                        <label><input type="radio" name="bgDetectionMode" value="manual" onchange="toggleColorPicker(true)"> اختيار يدوي</label>
                    </div>
                </div>
                
                <div class="option-group" id="manualColorPicker" style="display: none;">
                    <label for="bgColorPicker">اختر لون الخلفية المراد إزالته:</label>
                    <div style="display: flex; gap: 10px; align-items: center; margin-top: 8px;">
                        <input type="color" id="bgColorPicker" value="#ffffff">
                        <span style="font-size: 14px; color: #666;">(اضغط لاختيار اللون)</span>
                    </div>
                </div>

                <div class="option-group">
                    <label for="bgThreshold">حساسية الخلفية:</label>
                    <div style="display: flex; align-items: center; gap: 15px;">
                        <input type="range" id="bgThreshold" min="5" max="100" value="30" step="1" style="flex:1;">
                        <span id="thresholdValue" style="font-weight: bold; color: var(--accent);">30</span>
                    </div>
                    <p style="font-size: 12px; color: #888; margin-top: 5px;">قيمة أقل = دقة أعلى وتبقي الحواف | قيمة أعلى = تزيل المزيد من الألوان المتقاربة</p>
                </div>
            </div>
        </div>
    </div>
</main>

<!-- Footer -->
<footer class="converter-footer">
    <p>Image Pro - محول الصور الذكي والسريع</p>
</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.js"></script>
<script src="premium-utils.js"></script>
<script src="dashboard.js"></script>
<script src="script.js"></script>

<script>
    // Track visitor on converter page - already tracked in script.js
    // This is redundant but confirms tracking is working
    if (typeof trackVisitor === 'function') {
        // trackVisitor is already called in script.js on DOMContentLoaded
    }
</script>

</body>
</html>
