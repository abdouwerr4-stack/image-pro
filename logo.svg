<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" width="200" height="200">
  <!-- Background with gradient -->
  <defs>
    <linearGradient id="logoBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="url(#logoBg)"/>
  
  <!-- Arrow/Check mark shape -->
  <g transform="translate(100, 100)">
    <!-- Top right stroke -->
    <path d="M -30 -20 L 20 30" stroke="white" stroke-width="16" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Bottom left stroke -->
    <path d="M 20 30 L -35 40" stroke="white" stroke-width="16" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>